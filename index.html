<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Mudra Viewer</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 14px/1.5 system-ui, sans-serif;
        background: #f5f4ee; color: #3d3d3a;
        display: flex; flex-direction: column; height: 100vh;
      }
      header {
        display: flex; align-items: center; gap: 16px;
        padding: 12px 20px; background: #faf9f5; border-bottom: 1px solid #e8e6dd;
      }
      h1 { font-size: 16px; margin: 0; font-weight: 600; }
      #connect, #play {
        padding: 8px 18px; border: 0; border-radius: 6px; cursor: pointer;
        background: #c96442; color: #fff; font-size: 14px; font-weight: 600;
      }
      #play { background: #6b6858; }
      #connect:disabled, #play:disabled { background: #e0ddd0; color: #a5a294; cursor: not-allowed; }
      #connect.connected { background: #b5482f; }
      #play.connected { background: #4a4840; }
      #play-wrap { position: relative; }
      #play-menu {
        position: absolute; top: calc(100% + 6px); right: 0; z-index: 10; min-width: 100%;
        background: #faf9f5; border: 1px solid #e8e6dd; border-radius: 8px;
        box-shadow: 0 6px 20px rgba(61, 61, 58, 0.15); overflow: hidden; padding: 4px;
      }
      #play-menu[hidden] { display: none; }
      #play-menu button {
        display: block; width: 100%; text-align: left; white-space: nowrap;
        padding: 8px 14px; border: 0; border-radius: 5px; background: none;
        color: #3d3d3a; font-size: 14px; font-weight: 500; cursor: pointer;
      }
      #play-menu button:hover { background: #efece1; }
      #status {
        width: 11px; height: 11px; border-radius: 50%; margin-left: auto;
        background: currentColor; color: #a5a294; box-shadow: 0 0 6px currentColor;
        cursor: default; flex: none;
      }
      #status.ok { color: #0f9d58; }
      #status.error { color: #d92d20; }
      #status.busy { color: #d99a2b; }
      #banner {
        display: none; padding: 10px 20px; background: #fbf0d9;
        color: #8a6d3b; border-bottom: 1px solid #ecdcb3;
      }
      #plots { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      .lane { flex: 1; position: relative; border-bottom: 1px solid #e8e6dd; min-height: 0; }
      .lane label {
        position: absolute; top: 6px; left: 10px; z-index: 1;
        color: #6b6858; font-size: 12px; pointer-events: none;
      }
      canvas { display: block; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <header>
      <h1>Mudra Viewer</h1>
      <span id="status" title="Not connected"></span>
      <span id="play-wrap">
        <button id="play">Play ▾</button>
        <div id="play-menu" hidden></div>
      </span>
      <button id="connect">Connect</button>
    </header>
    <div id="banner"></div>
    <div id="plots"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
